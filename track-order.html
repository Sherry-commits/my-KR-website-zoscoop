<body>

<main class="section">

    <h1>주문 조회</h1>
    <p>주문 번호를 입력하면 최신 배송 상태를 확인할 수 있습니다.</p>
    <form id="trackingLookupForm" class="checkout-form">
      <label for="lookupOrderId">주문 번호 (Order ID)</label>
      <input id="lookupOrderId" type="text" required placeholder="예: 76L95730FE543591C">
      <button class="btn btn-primary" type="submit">배송 상태 조회</button>
    </form>
    <div id="trackingLookupResult" class="tracking-result" hidden></div>
    <p class="secure-note">도움이 필요하시면 <a href="mailto:info@zoscoop.com">info@zoscoop.com</a> 으로 연락 주세요.</p>
  </div>
