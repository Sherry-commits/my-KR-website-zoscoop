<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoscoop | 결제 미완료</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="./index.html" aria-label="Zoscoop 홈">
        <img src="./logo-removebg-preview.png" alt="Zoscoop logo">
      </a>
      <nav aria-label="메인 내비게이션">
        <ul class="nav-links">
          <li><a href="./index.html">홈</a></li>
          <li><a href="./product.html">상품</a></li>
          <li><a href="./contact.html">문의하기</a></li>
          <li><a href="./about.html">회사 소개</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container content-card">
      <h1>결제가 완료되지 않았습니다</h1>
      <p id="reasonText">결제 진행 중 문제가 발생했거나 결제가 취소되었습니다.</p>
      <div class="hero-cta">
        <a href="./checkout.html" class="btn btn-primary">다시 결제하기</a>
        <a href="./contact.html" class="btn btn-secondary">고객 문의하기</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <section>
        <h3>안내</h3>
        <ul>
          <li><a href="./terms.html">이용약관</a></li>
          <li><a href="./privacy.html">개인정보처리방침</a></li>
        </ul>
      </section>
      <section>
        <h3>고객센터</h3>
        <ul>
          <li><a href="./shipping.html">배송 정책</a></li>
          <li><a href="./returns.html">교환/환불 정책</a></li>
          <li><a href="./payment-tax.html">결제 및 세금</a></li>
          <li><a href="./track-order.html">주문 조회</a></li>
        </ul>
      </section>
      <section>
        <h3>문의하기</h3>
        <p><a href="mailto:info@zoscoop.com">info@zoscoop.com</a></p>
      </section>
    </div>
  </footer>

  <script>
    const q = new URLSearchParams(window.location.search);
    const reason = q.get("reason");
    const reasonText = document.getElementById("reasonText");
    if (reason === "cancel") {
      reasonText.textContent = "결제가 취소되었습니다. 다시 시도해 주세요.";
    } else if (reason === "error") {
      reasonText.textContent = "결제 중 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.";
    }
  </script>
</body>
</html>
